<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord - Agent</title>
  <link rel="stylesheet" href="dashboard-agent.css" />
</head>
<body>
  <header>
    <div class="logo">
      <img src="icons/prenatalcare.jpg" alt="Logo PrenatalCare" />
      <span>PrenatalCare</span>
    </div>
    <div class="agent-actions">
      <span class="agent-name" id="agentNameHeader">Agent</span>
      <button class="logout" onclick="deconnexion()">Déconnexion</button>
    </div>
  </header>

  <main>
    <h1 id="welcomeMessage">Bienvenue, Agent</h1>

    <section class="dashboard">
      <div class="card">
        <h2>Femmes suivies</h2>
        <p>24</p>
      </div>
      <div class="card">
        <h2>Rendez-vous à venir</h2>
        <p>8</p>
      </div>
      <div class="card">
        <h2>Consultations aujourd'hui</h2>
        <p>3</p>
      </div>
    </section>

    <section class="upcoming">
      <h2>Prochains Rendez-vous</h2>
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Date</th>
            <th>Heure</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Amina Bello</td>
            <td>18 Juillet 2025</td>
            <td>09h00</td>
            <td><button class="small">Voir</button></td>
          </tr>
          <tr>
            <td>Yasmine Agossa</td>
            <td>18 Juillet 2025</td>
            <td>11h30</td>
            <td><button class="small">Voir</button></td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    // Fonction appelée au chargement de la page
    document.addEventListener("DOMContentLoaded", () => {
      const agentJSON = localStorage.getItem("agentConnecte");

      if (!agentJSON) {
        // Redirection si pas connecté
        window.location.href = "#";
        return;
      }

      try {
        const agent = JSON.parse(agentJSON);
        const nom = agent.nom || "Agent";

        document.getElementById("agentNameHeader").textContent = nom;
        document.getElementById("welcomeMessage").textContent = `Bienvenue, ${nom}`;
      } catch (e) {
        console.error("Erreur lors du chargement de l'agent :", e);
        window.location.href = "#";
      }
    });

    // Fonction de déconnexion
    function deconnexion() {
      localStorage.removeItem("agentConnecte");
      window.location.href = "#";
    }
  </script>
</body>
</html>
